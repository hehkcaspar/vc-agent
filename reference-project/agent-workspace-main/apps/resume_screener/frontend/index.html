<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历筛选器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css?v=6">
</head>
<body>
    <div class="app">
        <!-- Background decoration -->
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
        
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">◆</span>
                <span class="logo-text">溯理科技Causally - 智能收简历</span>
            </div>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span class="status-text">连接中...</span>
            </div>
        </header>

        <!-- Main content -->
        <main class="main">
            <!-- View 1: Waiting for Input -->
            <section class="view waiting-view" id="waitingView">
                <div class="waiting-container">
                    <div class="radar">
                        <div class="radar-ring"></div>
                        <div class="radar-ring"></div>
                        <div class="radar-ring"></div>
                        <div class="radar-center">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                        </div>
                    </div>
                    <h1 class="waiting-title">等待简历</h1>
                    <p class="waiting-subtitle">将简历扫描仪，或放入incoming文件夹</p>
                    <div class="supported-formats">
                        <span class="format-tag">PDF</span>
                        <span class="format-tag">DOCX</span>
                        <span class="format-tag">JPG</span>
                        <span class="format-tag">PNG</span>
                    </div>
                    <div class="pulse-indicator" id="pulseIndicator">
                        <span class="pulse-dot"></span>
                        <span id="pulseText">每3秒监测文件夹</span>
                    </div>
                </div>
            </section>

            <!-- View 2: Processing -->
            <section class="view processing-view hidden" id="processingView">
                <div class="processing-container">
                        <div class="preview-frame" id="previewFrame">
                            <div class="preview-content hidden" id="previewContent">
                                <!-- Image or Iframe injected here -->
                            </div>
                            <div class="preview-placeholder" id="previewPlaceholder">
                                <div class="file-icon">
                                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                        <polyline points="14 2 14 8 20 8"/>
                                    </svg>
                                </div>
                                <span class="file-name" id="processingFileName">candidate_resume.pdf</span>
                                <span class="file-size" id="processingFileSize">2.4 MB</span>
                            </div>
                            <!-- Paper effect overlay -->
                            <div class="paper-overlay"></div>
                            <!-- Scanning overlay -->
                            <div class="scan-overlay">
                                <div class="scan-line"></div>
                                <div class="scan-grid"></div>
                            </div>
                        </div>
                    
                    <div class="processing-status">
                        <div class="status-badge analyzing">
                            <span class="spinner"></span>
                            <span>正在分析简历</span>
                        </div>
                        <h2 class="processing-title">筛选进行中</h2>
                        <p class="processing-desc">AI 正在根据职位要求评估候选人</p>
                        
                        <div class="progress-steps">
                            <div class="step active" data-step="1">
                                <span class="step-number">1</span>
                                <span class="step-label">提取内容</span>
                            </div>
                            <div class="step" data-step="2">
                                <span class="step-number">2</span>
                                <span class="step-label">分析工作经历</span>
                            </div>
                            <div class="step" data-step="3">
                                <span class="step-number">3</span>
                                <span class="step-label">匹配职位要求</span>
                            </div>
                            <div class="step" data-step="4">
                                <span class="step-number">4</span>
                                <span class="step-label">生成结论</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- View 3: Conclusion -->
            <section class="view conclusion-view hidden" id="conclusionView">
                <div class="conclusion-container">
                    <!-- Verdict Card -->
                    <div class="verdict-card" id="verdictCard">
                        <div class="verdict-header">
                            <div class="verdict-badge" id="verdictBadge">
                                <span class="verdict-icon" id="verdictIcon">✓</span>
                            </div>
                            <div class="verdict-title-group">
                                <h2 class="verdict-label" id="verdictLabel">决策</h2>
                                <!-- verdictText removed; finalMessage will display main text -->
                            </div>
                            <!-- candidate name inside header -->
                            <div class="candidate-name" id="candidateNameTitle"></div>
                        </div>
                        
                        <!-- final message area (candidate name moved into header) -->
                        <div class="final-message" id="finalMessage"></div>
                        <div class="matched-position" id="matchedPosition"></div>

                    </div>

                    <!-- Summary Section and other details (hidden on main screen) -->
                    <div id="conclusionDetails">
                        <div class="candidate-info">
                            <div class="info-row">
                                <span class="info-label">候选人</span>
                                <span class="info-value" id="candidateName">—</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">职位</span>
                                <span class="info-value" id="positionTitle">—</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">置信度</span>
                                <span class="info-value" id="confidenceLevel">中</span>
                            </div>
                        </div>
                        <div class="summary-section">
                            <h3 class="section-title">评估摘要</h3>
                            <p class="summary-text" id="summaryText">
                                评估进行中...
                            </p>
                        </div>

                        <!-- Strengths & Gaps -->
                        <div class="details-grid">
                            <div class="details-card strengths">
                                <div class="card-header">
                                    <span class="card-icon">+</span>
                                    <h4>关键优势</h4>
                                </div>
                                <ul class="details-list" id="strengthsList">
                                </ul>
                            </div>
                            
                            <div class="details-card gaps">
                                <div class="card-header">
                                    <span class="card-icon">−</span>
                                    <h4>待探索项</h4>
                                </div>
                                <ul class="details-list" id="gapsList">
                                </ul>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="action-bar">
                        <button class="btn btn-secondary" id="resetBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 18 9 12 15 6"/>
                            </svg>
                            返回等待
                        </button>
                        <button class="btn btn-primary" id="viewDetailsBtn">
                            查看完整报告
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>由 <span class="brand">@agent_workspace</span> 提供</p>
        </footer>
    </div>

    <!-- Configuration widget (floating) -->
    <div class="config-widget" id="configWidget">
        <label>
            间隔
            <input id="pollInput" type="number" min="3" step="1" style="width:3rem" />
            秒
        </label>
    </div>

    <!-- Toast notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Full Report Modal -->
    <div class="modal-overlay hidden" id="fullReportModal">
        <div class="modal">
            <div class="modal-header">
                <h2>详细评估报告</h2>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-content" id="modalContent">
                <!-- Content populated by JS -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="closeModalFooterBtn">关闭</button>
                <button class="btn btn-primary" id="printReportBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 6 2 18 2 18 9"/>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                        <rect x="6" y="14" width="12" height="8"/>
                    </svg>
                    打印
                </button>
            </div>
        </div>
    </div>

    <!-- Markdown renderer and sanitizer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
    <script src="/static/app.js?v=6"></script>
</body>
</html>
